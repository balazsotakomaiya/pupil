<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pupil — Command Palette</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a;--bg-subtle:#111;--bg-elevated:#161616;
    --border:#1e1e1e;--border-hover:#333;--ruler:#2a2a2a;
    --text-primary:#ededed;--text-secondary:#888;--text-tertiary:#555;
    --success:#10b981;--success-dim:#10b98115;
    --radius:8px;--radius-lg:12px;
    --font-sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:"JetBrains Mono","SF Mono","Fira Code",monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);font-size:15px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

  /* ═══ FAKE PAGE BEHIND — just enough to show context ═══ */
  .page-behind{
    opacity:0.3;pointer-events:none;
    padding:80px 32px;max-width:960px;margin:0 auto;
  }
  .fake-bar{height:12px;border-radius:6px;background:var(--bg-subtle);margin-bottom:16px;width:60%}
  .fake-bar.short{width:35%}
  .fake-bar.long{width:80%}
  .fake-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:32px}
  .fake-card{height:140px;border-radius:var(--radius-lg);background:var(--bg-subtle);border:1px solid var(--border)}

  /* ═══ OVERLAY ═══ */
  .palette-overlay{
    position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:flex;align-items:flex-start;justify-content:center;
    padding-top:min(18vh, 160px);
  }

  /* ═══ PALETTE ═══ */
  .palette{
    width:100%;max-width:560px;
    background:var(--bg-subtle);
    border:1px solid var(--border-hover);
    border-radius:16px;
    box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
    overflow:hidden;
    display:flex;flex-direction:column;
    max-height:min(480px, 70vh);
    animation:paletteIn 0.15s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes paletteIn{
    0%{opacity:0;transform:scale(0.97) translateY(-8px)}
    100%{opacity:1;transform:scale(1) translateY(0)}
  }

  /* ── Search input ── */
  .palette-input-wrap{
    display:flex;align-items:center;gap:10px;
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .palette-input-icon{color:var(--text-tertiary);flex-shrink:0}
  .palette-input-icon svg{width:16px;height:16px}

  .palette-input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text-primary);
    font-family:var(--font-sans);font-size:15px;font-weight:400;
    letter-spacing:-0.1px;
  }
  .palette-input::placeholder{color:var(--text-tertiary)}

  .palette-input-shortcut{
    display:flex;align-items:center;gap:3px;flex-shrink:0;
  }
  .kbd{
    font-family:var(--font-mono);font-size:9px;font-weight:500;
    color:var(--text-tertiary);
    background:var(--bg-elevated);border:1px solid var(--border);
    border-radius:4px;padding:2px 6px;min-width:20px;text-align:center;
    line-height:1.5;
  }

  /* ── Scope chip (appears when scoped) ── */
  .scope-chip{
    display:none;align-items:center;gap:4px;
    font-family:var(--font-mono);font-size:10px;font-weight:500;
    color:var(--text-secondary);
    background:var(--bg-elevated);border:1px solid var(--border);
    border-radius:5px;padding:3px 8px;
    flex-shrink:0;white-space:nowrap;
  }
  .scope-chip.visible{display:flex}
  .scope-chip svg{width:10px;height:10px;opacity:0.5}

  /* ── Results ── */
  .palette-results{
    flex:1;overflow-y:auto;
    padding:6px;
  }
  .palette-results::-webkit-scrollbar{width:4px}
  .palette-results::-webkit-scrollbar-track{background:transparent}
  .palette-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .result-group{margin-bottom:4px}

  .result-group-label{
    font-family:var(--font-mono);font-size:10px;font-weight:500;
    text-transform:uppercase;letter-spacing:1px;
    color:var(--text-tertiary);
    padding:8px 12px 4px;
  }

  .result-item{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px;border-radius:8px;
    cursor:pointer;transition:background 0.08s;
    user-select:none;
  }
  .result-item:hover,
  .result-item.selected{
    background:var(--bg-elevated);
  }
  .result-item.selected{
    outline:1px solid var(--border-hover);
  }

  .result-icon{
    width:28px;height:28px;border-radius:7px;
    background:var(--bg-elevated);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:border-color 0.1s;
  }
  .result-item.selected .result-icon,
  .result-item:hover .result-icon{border-color:var(--border-hover)}
  .result-icon svg{width:13px;height:13px;color:var(--text-tertiary)}

  .result-content{flex:1;min-width:0}

  .result-title{
    font-size:13.5px;font-weight:500;letter-spacing:-0.1px;
    color:var(--text-primary);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .result-subtitle{
    font-size:11.5px;color:var(--text-tertiary);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    margin-top:1px;
  }

  /* Match highlight */
  .result-title mark, .result-subtitle mark{
    background:transparent;color:var(--text-primary);
    text-decoration:underline;text-decoration-color:var(--success);
    text-underline-offset:2px;
    font-weight:600;
  }

  .result-meta{
    display:flex;align-items:center;gap:6px;
    flex-shrink:0;
  }

  .result-badge{
    font-family:var(--font-mono);font-size:9px;font-weight:500;
    text-transform:uppercase;letter-spacing:0.3px;
    color:var(--text-tertiary);
    background:var(--bg-subtle);border:1px solid var(--border);
    border-radius:4px;padding:1px 6px;
  }

  .result-shortcut{
    display:flex;gap:2px;
  }

  .result-arrow{color:var(--text-tertiary);opacity:0;transition:opacity 0.1s}
  .result-item:hover .result-arrow,
  .result-item.selected .result-arrow{opacity:1}
  .result-arrow svg{width:12px;height:12px}

  /* ── Footer ── */
  .palette-footer{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px;
    border-top:1px solid var(--border);
    flex-shrink:0;
    background:rgba(255,255,255,0.01);
  }
  .footer-hints{
    display:flex;align-items:center;gap:12px;
  }
  .footer-hint{
    display:flex;align-items:center;gap:4px;
    font-size:11px;color:var(--text-tertiary);
  }
  .footer-hint .kbd{font-size:8px;padding:1px 4px;min-width:16px}

  .footer-logo{
    display:flex;align-items:center;gap:5px;
    font-family:var(--font-mono);font-size:9px;
    color:var(--text-tertiary);opacity:0.4;
    letter-spacing:0.5px;text-transform:uppercase;
  }

  /* ── Empty state ── */
  .palette-empty{
    padding:32px 16px;text-align:center;
  }
  .palette-empty-text{font-size:13px;color:var(--text-tertiary)}

  /* ═══ RESPONSIVE ═══ */
  @media(max-width:640px){
    .palette-overlay{padding-top:12px;padding-left:8px;padding-right:8px}
    .palette{max-width:100%;border-radius:12px}
  }
</style>
</head>
<body>

<!-- Fake page behind for context -->
<div class="page-behind">
  <div class="fake-bar"></div>
  <div class="fake-bar short"></div>
  <div class="fake-bar long"></div>
  <div class="fake-grid">
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
    <div class="fake-card"></div>
  </div>
</div>

<!-- ═══ COMMAND PALETTE ═══ -->
<div class="palette-overlay" id="overlay" onclick="if(event.target===this)closePalette()">
  <div class="palette">

    <!-- Input -->
    <div class="palette-input-wrap">
      <div class="palette-input-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M10.5 10.5L14 14"/></svg>
      </div>
      <div class="scope-chip" id="scopeChip">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="1.5" width="9" height="9" rx="2"/></svg>
        <span id="scopeLabel">Spaces</span>
        <span style="color:var(--text-tertiary);opacity:0.4;margin-left:2px">›</span>
      </div>
      <input
        type="text"
        class="palette-input"
        id="paletteInput"
        placeholder="Search cards, spaces, or actions…"
        autocomplete="off"
        autofocus
        oninput="onSearch()"
      >
      <div class="palette-input-shortcut">
        <span class="kbd">esc</span>
      </div>
    </div>

    <!-- Results -->
    <div class="palette-results" id="results"></div>

    <!-- Footer -->
    <div class="palette-footer">
      <div class="footer-hints">
        <div class="footer-hint"><span class="kbd">↑</span><span class="kbd">↓</span> Navigate</div>
        <div class="footer-hint"><span class="kbd">↵</span> Open</div>
        <div class="footer-hint"><span class="kbd">tab</span> Scope</div>
      </div>
      <div class="footer-logo">⌘K</div>
    </div>

  </div>
</div>

<script>
  // ── Data ──
  const data = {
    actions: [
      { title: 'Study all due cards', subtitle: '42 cards across 5 spaces', icon: 'study', shortcut: null },
      { title: 'New Space', subtitle: 'Create an empty space', icon: 'plus', shortcut: null },
      { title: 'New Card', subtitle: 'Add a card manually', icon: 'plus', shortcut: '⌘N' },
      { title: 'AI Generate', subtitle: 'Generate cards with AI', icon: 'sparkle', shortcut: null },
      { title: 'Import .apkg', subtitle: 'Import from Anki', icon: 'import', shortcut: null },
      { title: 'Settings', subtitle: 'AI provider, data, shortcuts', icon: 'settings', shortcut: '⌘,' },
    ],
    spaces: [
      { title: 'Machine Learning', subtitle: '234 cards · 18 due', icon: 'space', badge: null },
      { title: 'Rust Ownership', subtitle: '89 cards · 7 due', icon: 'space', badge: null },
      { title: 'World History', subtitle: '312 cards · 11 due', icon: 'space', badge: null },
      { title: 'Music Theory', subtitle: '67 cards · 4 due', icon: 'space', badge: null },
      { title: 'Biochemistry', subtitle: '145 cards · 2 due', icon: 'space', badge: null },
    ],
    cards: [
      { title: 'What is the vanishing gradient problem?', subtitle: 'Machine Learning', icon: 'card', badge: 'Review' },
      { title: 'Explain backpropagation in one sentence', subtitle: 'Machine Learning', icon: 'card', badge: 'Review' },
      { title: 'What does a learning rate control?', subtitle: 'Machine Learning', icon: 'card', badge: 'Relearning' },
      { title: 'Explain ownership vs borrowing in Rust', subtitle: 'Rust Ownership', icon: 'card', badge: 'Review' },
      { title: 'What causes a move vs a copy in Rust?', subtitle: 'Rust Ownership', icon: 'card', badge: 'New' },
      { title: 'What was the Treaty of Westphalia?', subtitle: 'World History', icon: 'card', badge: 'Learning' },
      { title: 'What interval defines a perfect fifth?', subtitle: 'Music Theory', icon: 'card', badge: 'New' },
      { title: "What is the Krebs cycle's primary output?", subtitle: 'Biochemistry', icon: 'card', badge: 'Review' },
      { title: 'Name three regularization techniques', subtitle: 'Machine Learning', icon: 'card', badge: 'Review' },
      { title: 'Define the bias-variance tradeoff', subtitle: 'Machine Learning', icon: 'card', badge: 'Review' },
    ],
    navigation: [
      { title: 'Dashboard', subtitle: 'Home screen', icon: 'grid', shortcut: null },
      { title: 'All Cards', subtitle: '847 cards total', icon: 'list', shortcut: null },
      { title: 'Import', subtitle: 'Anki import', icon: 'import', shortcut: null },
    ],
  };

  const icons = {
    study: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3.5l2 1.5"/></svg>',
    plus: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 3v8M3 7h8"/></svg>',
    sparkle: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M7 1l1.5 4L13 7l-4.5 2L7 13 5.5 9 1 7l4.5-2z"/></svg>',
    import: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M10 8.5v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3"/><path d="M7 2v7.5"/><path d="M5 7l2 2.5L9 7"/></svg>',
    settings: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="7" cy="7" r="2"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2M2.8 2.8l1.4 1.4M9.8 9.8l1.4 1.4M11.2 2.8l-1.4 1.4M4.2 9.8l-1.4 1.4"/></svg>',
    space: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="2" width="10" height="10" rx="2.5"/></svg>',
    card: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="3" width="10" height="8" rx="1.5"/><path d="M4.5 6h5M4.5 8.5h3"/></svg>',
    grid: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="1.5" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="8" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="1.5" y="8" width="4.5" height="4.5" rx="1"/><rect x="8" y="8" width="4.5" height="4.5" rx="1"/></svg>',
    list: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 3.5h10M2 7h7M2 10.5h9"/></svg>',
  };

  let selectedIdx = 0;
  let flatItems = [];

  // ── Render ──
  function renderResults(query) {
    const container = document.getElementById('results');
    const q = query.toLowerCase().trim();
    flatItems = [];
    let html = '';

    const groups = [
      { key: 'actions', label: 'Actions', items: data.actions },
      { key: 'spaces', label: 'Spaces', items: data.spaces },
      { key: 'cards', label: 'Cards', items: data.cards },
      { key: 'navigation', label: 'Navigate', items: data.navigation },
    ];

    // If scoped, only show that group
    const scopeEl = document.getElementById('scopeChip');
    const isScoped = scopeEl.classList.contains('visible');
    const scopeLabel = document.getElementById('scopeLabel').textContent.toLowerCase();

    for (const group of groups) {
      if (isScoped && group.label.toLowerCase() !== scopeLabel) continue;

      const filtered = q
        ? group.items.filter(item =>
            item.title.toLowerCase().includes(q) ||
            (item.subtitle && item.subtitle.toLowerCase().includes(q))
          )
        : group.items;

      if (filtered.length === 0) continue;

      html += `<div class="result-group"><div class="result-group-label">${group.label}</div>`;

      for (const item of filtered) {
        const idx = flatItems.length;
        flatItems.push(item);

        const title = q ? highlight(item.title, q) : esc(item.title);
        const subtitle = item.subtitle ? (q ? highlight(item.subtitle, q) : esc(item.subtitle)) : '';

        let metaHtml = '';
        if (item.badge) metaHtml += `<span class="result-badge">${item.badge}</span>`;
        if (item.shortcut) metaHtml += `<div class="result-shortcut">${item.shortcut.split('').map(k => `<span class="kbd">${k}</span>`).join('')}</div>`;

        html += `
          <div class="result-item ${idx === selectedIdx ? 'selected' : ''}"
               data-idx="${idx}"
               onmouseenter="selectItem(${idx})"
               onclick="executeItem(${idx})">
            <div class="result-icon">${icons[item.icon] || ''}</div>
            <div class="result-content">
              <div class="result-title">${title}</div>
              ${subtitle ? `<div class="result-subtitle">${subtitle}</div>` : ''}
            </div>
            <div class="result-meta">
              ${metaHtml}
              <div class="result-arrow"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4.5 2l4 4-4 4"/></svg></div>
            </div>
          </div>`;
      }

      html += '</div>';
    }

    if (flatItems.length === 0) {
      html = `<div class="palette-empty"><div class="palette-empty-text">No results for "${esc(query)}"</div></div>`;
    }

    container.innerHTML = html;

    // Ensure selection in bounds
    if (selectedIdx >= flatItems.length) selectedIdx = Math.max(0, flatItems.length - 1);
    updateSelection();
  }

  function highlight(text, q) {
    const escaped = esc(text);
    const qEsc = esc(q);
    const idx = escaped.toLowerCase().indexOf(qEsc.toLowerCase());
    if (idx === -1) return escaped;
    return escaped.slice(0, idx) + '<mark>' + escaped.slice(idx, idx + qEsc.length) + '</mark>' + escaped.slice(idx + qEsc.length);
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function selectItem(idx) {
    selectedIdx = idx;
    updateSelection();
  }

  function updateSelection() {
    document.querySelectorAll('.result-item').forEach((el, i) => {
      el.classList.toggle('selected', i === selectedIdx);
    });
    // Scroll into view
    const sel = document.querySelector('.result-item.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }

  function executeItem(idx) {
    const item = flatItems[idx];
    if (!item) return;
    // In a real app this would navigate/execute. For the PoC, show what would happen.
    const input = document.getElementById('paletteInput');
    input.value = '';
    input.placeholder = `→ ${item.title}`;
    input.style.color = 'var(--success)';
    setTimeout(() => {
      input.style.color = '';
      input.placeholder = 'Search cards, spaces, or actions…';
      renderResults('');
    }, 800);
  }

  function onSearch() {
    selectedIdx = 0;
    renderResults(document.getElementById('paletteInput').value);
  }

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(flatItems.length - 1, selectedIdx + 1);
      updateSelection();
    }
    if (e.code === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(0, selectedIdx - 1);
      updateSelection();
    }
    if (e.code === 'Enter') {
      e.preventDefault();
      executeItem(selectedIdx);
    }
    if (e.code === 'Escape') {
      const scope = document.getElementById('scopeChip');
      if (scope.classList.contains('visible')) {
        // Exit scope first
        scope.classList.remove('visible');
        document.getElementById('paletteInput').placeholder = 'Search cards, spaces, or actions…';
        renderResults(document.getElementById('paletteInput').value);
      } else {
        closePalette();
      }
    }
    if (e.code === 'Tab') {
      e.preventDefault();
      cycleScope();
    }
    // Backspace on empty input clears scope
    if (e.code === 'Backspace' && !document.getElementById('paletteInput').value) {
      const scope = document.getElementById('scopeChip');
      if (scope.classList.contains('visible')) {
        scope.classList.remove('visible');
        document.getElementById('paletteInput').placeholder = 'Search cards, spaces, or actions…';
        renderResults('');
      }
    }
  });

  // ── Scope cycling ──
  const scopes = ['Actions', 'Spaces', 'Cards', 'Navigate'];
  let currentScope = -1; // -1 = no scope

  function cycleScope() {
    currentScope++;
    const chip = document.getElementById('scopeChip');
    if (currentScope >= scopes.length) {
      currentScope = -1;
      chip.classList.remove('visible');
      document.getElementById('paletteInput').placeholder = 'Search cards, spaces, or actions…';
    } else {
      chip.classList.add('visible');
      document.getElementById('scopeLabel').textContent = scopes[currentScope];
      document.getElementById('paletteInput').placeholder = `Search ${scopes[currentScope].toLowerCase()}…`;
    }
    selectedIdx = 0;
    renderResults(document.getElementById('paletteInput').value);
  }

  function closePalette() {
    document.getElementById('overlay').style.display = 'none';
  }

  // ── Init ──
  renderResults('');
  document.getElementById('paletteInput').focus();
</script>

</body>
</html>
