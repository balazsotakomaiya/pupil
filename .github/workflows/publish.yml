name: Publish

on:
  push:
    tags:
      - "app-v*"

jobs:
  publish:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            platform: linux
            tauri_args: --ci
          - label: Windows x64
            os: windows-latest
            platform: windows
            tauri_args: --ci
          - label: macOS Intel
            os: macos-latest
            platform: macos
            tauri_args: --ci --target x86_64-apple-darwin
          - label: macOS Apple Silicon
            os: macos-latest
            platform: macos
            tauri_args: --ci --target aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    name: Publish (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> target

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Validate release contract
        run: bun run release:check --tag "${{ github.ref_name }}"

      - name: Publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: ${{ github.ref_name }}
          releaseName: Pupil v__VERSION__
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.tauri_args }}
