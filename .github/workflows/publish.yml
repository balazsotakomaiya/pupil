name: Publish

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example app-v0.0.2
        required: true
        type: string
      ref:
        description: Branch, tag, or commit SHA to build from
        required: true
        default: main
        type: string

concurrency:
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_commitish: ${{ steps.commitish.outputs.release_commitish }}
    steps:
      - name: Resolve publish target
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.tag }}"
            checkout_ref="${{ inputs.ref }}"
          else
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="${GITHUB_REF}"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout publish ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Resolve release commitish
        id: commitish
        shell: bash
        run: |
          input_ref="${{ steps.resolve.outputs.checkout_ref }}"

          if [[ "$input_ref" == refs/heads/* ]]; then
            release_commitish="${input_ref#refs/heads/}"
          elif [[ "$input_ref" == refs/tags/* ]]; then
            release_commitish="$(git rev-parse "${input_ref}^{commit}")"
          elif git show-ref --verify --quiet "refs/heads/${input_ref}"; then
            release_commitish="${input_ref}"
          elif git show-ref --verify --quiet "refs/tags/${input_ref}"; then
            release_commitish="$(git rev-parse "${input_ref}^{commit}")"
          else
            release_commitish="${input_ref}"
          fi

          echo "release_commitish=${release_commitish}" >> "$GITHUB_OUTPUT"

      - name: Clear existing release assets
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              const assets = release.data.assets ?? [];

              if (assets.length === 0) {
                core.info(`No existing assets found for ${tag}.`);
                return;
              }

              for (const asset of assets) {
                core.info(`Deleting existing asset ${asset.name} (${asset.id}) from ${tag}.`);
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for ${tag}.`);
                return;
              }

              throw error;
            }

  publish:
    needs: prepare
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            platform: linux
            tauri_args: --ci
          - label: Windows x64
            os: windows-latest
            platform: windows
            tauri_args: --ci
          - label: macOS Intel
            os: macos-latest
            platform: macos
            tauri_args: --ci --target x86_64-apple-darwin
          - label: macOS Apple Silicon
            os: macos-latest
            platform: macos
            tauri_args: --ci --target aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    name: Publish (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/app/src-tauri -> target

      - name: Cache Tauri Linux bundler tools
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: tauri-linux-tools-v1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Prefetch Tauri Linux bundler tools
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.cache/tauri"

          curl --fail --location --retry 5 --retry-all-errors --retry-delay 5 \
            --output "${HOME}/.cache/tauri/AppRun-x86_64" \
            "https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64"
          chmod +x "${HOME}/.cache/tauri/AppRun-x86_64"

          curl --fail --location --retry 5 --retry-all-errors --retry-delay 5 \
            --output "${HOME}/.cache/tauri/linuxdeploy-x86_64.AppImage" \
            "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage"
          chmod +x "${HOME}/.cache/tauri/linuxdeploy-x86_64.AppImage"

          curl --fail --location --retry 5 --retry-all-errors --retry-delay 5 \
            --output "${HOME}/.cache/tauri/linuxdeploy-plugin-gtk.sh" \
            "https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x "${HOME}/.cache/tauri/linuxdeploy-plugin-gtk.sh"

      - name: Validate release contract
        run: bun run release:check --tag "${{ needs.prepare.outputs.release_tag }}"

      - name: Publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tagName: ${{ needs.prepare.outputs.release_tag }}
          releaseName: Pupil v__VERSION__
          releaseCommitish: ${{ needs.prepare.outputs.release_commitish }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.tauri_args }}
